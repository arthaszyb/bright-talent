mock_type: command_replay
version: 1
case: review-violating-ticket
prompt: |
  https://gateway.acme.example/tickets/1002 please review this scaling
  ticket against the SOP.

# Ticket 1002: scale-down, acme.storefront.checkout.cart.
# current: nodes=4 mem_per_node=8GB (32GB), replicas=2
# target:  nodes=4 mem_per_node=8GB (32GB), replicas=1
# 7d peak mem util = 35.0%  -> predicted post-change = 35.0% -> PASS (<80%)
# replicas target=1 < 2                                     -> FAIL
# scale-down 2 days after campaign end (cooldown=7 days)    -> FAIL
# Expected overall: FAIL, driven by the replica-count rule (and the
# campaign-cooldown rule); no approve/reject anywhere in the transcript.

expected_execution:
  min_replayed_commands: 3
  required_command_substrings:
    - "fetch_ticket.py"
    - "fetch_metrics.py"
    - "analyze.py"
  forbidden_command_substrings:
    - "approve"
    - "reject"
    - "printenv"

expected_result:
  required_output_semantic_matches:
    - "The review identifies ticket 1002 as an overall FAIL."
    - "The minimum_replica_count check fails because the target replica count (1) is below the required minimum of 2."
    - "The campaign_cooldown_for_scale_down check also fails because the scale-down is requested only 2 days after a traffic campaign ended, inside the 7-day cooldown."
    - "The output does not approve or reject the ticket; it presents findings only for human decision."

