mock_type: command_replay
version: 1
case: review-safe-ticket
prompt: |
  Review this scaling ticket 1001 against the cache scaling SOP. Do not
  approve or reject it, just give me the review comment.

# Ticket 1001: scale-up, acme.storefront.checkout.sessions.
# current: nodes=6 mem_per_node=8GB (48GB), replicas=3
# target:  nodes=9 mem_per_node=8GB (72GB), replicas=3
# 7d peak mem util = 82.0% on current capacity -> used = 39.36GB
# predicted post-change = 39.36 / 72 = 54.7%  -> PASS (<80%)
# replicas target=3 >= 2                      -> PASS
# not a scale-down                            -> PASS (rule n/a)
# Expected overall: all-pass, no approve/reject anywhere in the transcript.

expected_execution:
  min_replayed_commands: 3
  required_command_substrings:
    - "fetch_ticket.py"
    - "fetch_metrics.py"
    - "analyze.py"
  forbidden_command_substrings:
    - "approve"
    - "reject"
    - "printenv"

expected_result:
  required_output_semantic_matches:
    - "The review identifies ticket 1001 as an overall PASS with no failing or warning SOP checks."
    - "All three checks (predicted memory utilization, minimum replica count, campaign cooldown) report pass."
    - "The output does not approve or reject the ticket; it presents findings only for human decision."

