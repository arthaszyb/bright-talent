#
#   - id: end-of-quarter-freeze
#     description: "Freeze major changes at end of quarter"
#     match:
#       tool: "Bash"
#       pattern: ".*migrate|schema.*change"
#     condition: "is_end_of_quarter"
#     verdict: DENY
#     message: "Schema changes are frozen during quarter-end close"
#     prompt_hint: "Schema changes are frozen during quarter-end. Schedule this for the next quarter."

rules: []
