name: skills-ci

# Gate order matches release-and-ci.md §3:
#   detect-release -> lint -> version-check -> triggers -> safety -> e2e
#   -> (on merge to main) auto-tag + move `latest`
#
# Every gate below shells out to the plain scripts in skills/ci/ — the
# workflow never reimplements gate logic itself (DESIGN.md S4). Run the same
# scripts locally with `uv run --project skills/ci python skills/ci/<gate>.py ...`
# (see skills/ci/README.md).
#
# NOTE (workflow location): this file must live at the repository root
# (.github/workflows/) — GitHub never executes workflows from subdirectory
# .github/ folders, which is where an earlier revision of this pipeline sat.
#
# The triggers / safety / e2e gates drive a live `claude` CLI (agent runs +
# LLM judge), so they only execute when the ANTHROPIC_API_KEY repository
# secret is configured; without it those steps are skipped and the
# deterministic gates (detect-release, lint, version-check) still bind.

on:
  pull_request:
    paths: ["skills/skills/**"]
  push:
    branches: [main]
    paths: ["skills/skills/**"]
    tags: ["*/v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  detect-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v3
      - name: detect-release
        run: |
          uv run --project skills/ci python skills/ci/detect_release.py \
            --base "${{ github.event.pull_request.base.sha || 'HEAD~1' }}" \
            --head "${{ github.event.pull_request.head.sha || 'HEAD' }}"

  lint:
    needs: detect-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: lint ${{ matrix.skill }}
        run: |
          uv run --project skills/ci python skills/ci/lint.py skills/skills/${{ matrix.skill }}

  version-check:
    needs: detect-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v3
      - name: version-check ${{ matrix.skill }}
        run: |
          uv run --project skills/ci python skills/ci/version_check.py skills/skills/${{ matrix.skill }}

  triggers:
    needs: [lint, version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: install claude CLI
        if: env.ANTHROPIC_API_KEY != ''
        run: npm install -g @anthropic-ai/claude-code
      - name: triggers ${{ matrix.skill }}
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: false
        run: |
          uv run --project eval de-eval triggers skills/skills/${{ matrix.skill }}

  safety:
    needs: [lint, version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: install claude CLI
        if: env.ANTHROPIC_API_KEY != ''
        run: npm install -g @anthropic-ai/claude-code
      - name: safety ${{ matrix.skill }}
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: false
        run: |
          uv run --project eval de-eval safety skills/skills/${{ matrix.skill }}

  e2e:
    needs: [triggers, safety]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: install claude CLI
        if: env.ANTHROPIC_API_KEY != ''
        run: npm install -g @anthropic-ai/claude-code
      - name: e2e ${{ matrix.skill }}
        if: env.ANTHROPIC_API_KEY != ''
        continue-on-error: false
        run: |
          uv run --project eval de-eval e2e skills/skills/${{ matrix.skill }}

  auto-tag:
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        skill: [ticket-review]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, token: ${{ secrets.RELEASE_BOT_TOKEN }} }
      - uses: astral-sh/setup-uv@v3
      - name: resolve released version
        id: ver
        run: |
          uv run --project skills/ci python skills/ci/version_check.py skills/skills/${{ matrix.skill }}
          version=$(python3 -c "
          import re
          text = open('skills/skills/${{ matrix.skill }}/SKILL.md').read()
          m = re.search(r'^version:\s*(\S+)\s*$', text, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: create version tag + move latest
        run: |
          tag="${{ matrix.skill }}/v${{ steps.ver.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "tag $tag already exists, refusing to move it" >&2
            exit 1
          fi
          git tag -a "$tag" -m "release ${{ matrix.skill }} v${{ steps.ver.outputs.version }}"
          git push origin "$tag"
          git tag -f "${{ matrix.skill }}/latest" "$tag"
          git push -f origin "${{ matrix.skill }}/latest"
