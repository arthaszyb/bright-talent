name: repo-ci

# Repo-wide gates: lint floor, fictional-universe leak check, and the three
# deterministic pytest suites (builder / bridge / console). None of these
# jobs needs an authenticated `claude` CLI — the builder records the CLI
# version only when present, and console tests run against a freshly built
# instance runtime with the tracked build metadata restored afterwards.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: repo-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: ruff
        run: uvx ruff check .
      - name: workflow YAML must parse
        # A workflow with a YAML error fails every push with a jobless run;
        # catch it here where the diff is visible.
        run: |
          uv run --no-project --with pyyaml python -c \
            "import glob, yaml; [yaml.safe_load(open(f)) for f in glob.glob('.github/workflows/*.yml')]; print('workflows parse OK')"

  leak-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: leak-check
        run: bash scripts/leak-check.sh .

  builder-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: merge-invariant unit tests
        run: uv run --project scaffold/builder --extra dev pytest scaffold/builder/tests -q
      - name: validate + build the reference instance
        working-directory: instances/acme-checkout-sre
        run: |
          ../../scaffold/de validate .
          ../../scaffold/de build .
      - name: doctor + drift check on the fresh build
        working-directory: instances/acme-checkout-sre
        run: |
          ../../scaffold/de doctor .
          ../../scaffold/de diff .
      - name: committed build metadata must match a fresh build
        # .managed-files.json carries a per-build synced_at timestamp, so it
        # is compared with that field normalized away; the manifest must be
        # byte-identical.
        run: |
          git diff --exit-code -- instances/acme-checkout-sre/.build-manifest.json
          git show HEAD:instances/acme-checkout-sre/.managed-files.json \
            | python3 scripts/normalize-managed-files.py - > /tmp/committed-managed.json
          python3 scripts/normalize-managed-files.py \
            instances/acme-checkout-sre/.managed-files.json > /tmp/fresh-managed.json
          diff /tmp/committed-managed.json /tmp/fresh-managed.json
      - name: build determinism — second build must be byte-identical
        working-directory: instances/acme-checkout-sre
        run: |
          cp .build-manifest.json /tmp/first-build-manifest.json
          python3 ../../scripts/normalize-managed-files.py .managed-files.json > /tmp/first-managed.json
          ../../scaffold/de build .
          diff /tmp/first-build-manifest.json .build-manifest.json
          python3 ../../scripts/normalize-managed-files.py .managed-files.json > /tmp/second-managed.json
          diff /tmp/first-managed.json /tmp/second-managed.json

  eval-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: pytest
        run: uv run --project eval --extra dev pytest eval/tests -q
      - name: de-eval lint on the released skill (deterministic gate)
        run: uv run --project eval de-eval lint skills/skills/ticket-review
      - name: de-eval e2e dry-run (fixture runtime + replay wiring, no LLM)
        run: uv run --project eval de-eval e2e skills/skills/ticket-review --dry-run

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck the de CLI and repo scripts
        run: shellcheck scaffold/de scripts/leak-check.sh

  docker-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: compose up
        run: docker compose up -d --build --wait --wait-timeout 180
      - name: smoke — gateway serves the seeded ticket
        run: |
          curl -sf http://localhost:8801/tickets/1001 | grep '"ticket_id": "1001"'
      - name: smoke — console sees the instance
        run: |
          curl -sf http://localhost:8900/api/instances | grep acme-checkout-sre
      - name: compose logs on failure
        if: failure()
        run: docker compose logs
      - name: compose down
        if: always()
        run: docker compose down

  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: build instance runtime (fleet health needs it)
        working-directory: instances/acme-checkout-sre
        run: |
          ../../scaffold/de build .
          git checkout -- .
      - name: install chromium
        run: uv run --project console --extra e2e playwright install chromium --with-deps
      - name: browser smoke tests
        run: uv run --project console --extra e2e pytest console/tests_e2e -q

  mocks-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: pytest
        run: uv run --project mocks --extra dev pytest mocks/tests -q

  bridge-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: pytest
        run: uv run --project bridge --extra dev pytest bridge/tests -q

  console-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: build instance runtime (console health checks need it)
        working-directory: instances/acme-checkout-sre
        run: |
          ../../scaffold/de build .
          # Restore tracked build metadata: the console suite asserts the
          # instance tree stays clean, and drift checks read the committed
          # manifest against the runtime/ tree we just built.
          git checkout -- .
      - name: pytest
        run: uv run --project console --extra dev pytest console/tests -q
